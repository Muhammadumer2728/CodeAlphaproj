openapi: 3.1.0
info:
  title: Login API
  version: 1.0.0
paths:
  /api/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Successful login
        "400":
          description: Invalid input
      parameters:
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
